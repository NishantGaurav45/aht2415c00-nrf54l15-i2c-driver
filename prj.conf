# I2C bus driver for talking to the AHT2415C00 sensor
CONFIG_I2C=y

# Logging (used for printing temperature/humidity + debug info)
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Make sure printk output is enabled too
CONFIG_PRINTK=y

# Slightly larger main stack since we do float math for the conversion
CONFIG_MAIN_STACK_SIZE=2048
